version: '3'

services:
  frontend:
    image: yusushin/docker-frontend

    volumes:
      - /app/node_modules
      - ./front:/app
    environment:
      REACT_APP_SERVER : $REACT_APP_SERVER
      
    stdin_open: true

  backend:
    image: yusushin/docker-backend
    container_name: app_back
    volumes:
      - /app/node_modules
      - ./back:/app

    environment:
      POSTGRES_HOST : $POSTGRES_HOST
      POSTGRES_USERNAME : $POSTGRES_USERNAME
      POSTGRES_PASSWORD : $POSTGRES_PASSWORD
      POSTGRES_DATABASE : $POSTGRES_DATABASE
      POSTGRES_PORT : $POSTGRES_PORT
      POSTGRES_HOSTPORT : $POSTGRES_HOSTPORT
      POSTGRES_SYNCHRONIZE : false
  nginx:
    restart: always

    image: yusushin/docker-nginx

    ports:
      - "80:80"
