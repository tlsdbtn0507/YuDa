version: '3'

services:
  frontend:
    build: 
      dockerfile: Dockerfile.dev
      context: ./front

    volumes:
      - /app/node_modules
      - ./front:/app
    
    stdin_open: true

  backend:
    build: 
      dockerfile: Dockerfile.dev
      context: ./back
    container_name: app_back
    volumes:
      - /app/node_modules
      - ./back:/app
    
  nginx:
    restart: always

    build: 
      dockerfile: Dockerfile
      context: ./nginx

    ports:
      - "3000:80"
