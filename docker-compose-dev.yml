version: '3'

services:
  frontend:
    build: 
      dockerfile: Dockerfile.dev
      context: ./front

    env_file:
      - front/.env.local

    volumes:
      - /app/node_modules
      - ./front:/app
    
    stdin_open: true

    ports:
      - "3000:3000"

  backend:
    build: 
      dockerfile: Dockerfile.dev
      context: ./back
    container_name: app_back
    volumes:
      - /app/node_modules
      - ./back:/app
    environment:
      - NODE_ENV=development
    env_file:
      - back/.env.dev
    ports:
      - "3002:3002"
    
  # nginx:
  #   restart: always

  #   build: 
  #     dockerfile: Dockerfile
  #     context: ./nginx

  #   ports:
  #     - "3000:80"
  
  postgres:
    build: ./postgres
    restart: unless-stopped
    container_name: app_postgres
    ports:
      - "5432:5432"
    
    volumes:
      - ./postgres/postgres_data:/var/lib/postgres
      - ./postgres/sqls/:/docker-entrypoint-initdb.d/

    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=back
