name: YuDa CI CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Get Code 
      uses: actions/checkout@v3

    - name: Login DockerHub
      run: echo "${{secrets.DOCKER_HUB_PASSWORD}}" | docker login -u "${{secrets.DOCKER_HUB_ID}}" --password-stdin 
    
    - name: login azure
      run: az login --user "${{secrets.AZURE_LOGIN_ID}}" --password "${{secrets.AZURE_LOGIN_PW}}"

    - name: before_install
      run : docker build -t yusushin/yuda -f ./front/Dockerfile.dev ./front

    - name: Docker Test
      run : docker run -e CI=true yusushin/yuda npm test 

    - name: build dockers
      run: |
        docker build -t yusushin/docker-frontend ./front
        docker build -t yusushin/docker-backend ./back

    - name: authorizate ACR and login to ACR
      run: | 
        az acr update -n fronttest --admin-enabled true
        az acr login --name fronttest

    - name: tag ACR name
      run: | 
        docker tag yusushin/docker-frontend fronttest.azurecr.io/yudafront 
        docker tag yusushin/docker-backend fronttest.azurecr.io/yudaback 

    - name: push the dockers to ACR
      run: | 
        docker push fronttest.azurecr.io/yudafront
        docker push fronttest.azurecr.io/yudaback  

    - name: run compose file
      run : az acr run --registry fronttest --file docker-compose.yml .