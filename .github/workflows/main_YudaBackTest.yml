# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - YudaBackTest

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://fronttest.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_c34410a6094b43a983a281becf34c437 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_cc18ede6c8b34d12a5bbd4299d285223 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: fronttest.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_c34410a6094b43a983a281becf34c437 }}/yudaback:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'YudaBackTest'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_44285b2db82f4527b3fdcc8d41d99b46 }}
        images: 'fronttest.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_c34410a6094b43a983a281becf34c437 }}/yudaback:${{ github.sha }}'